name: Npm Publish Pipeline deshicode/svelte-utils

on:
  release:
    types: [created] # Only runs when you create a new GitHub Release/Tag

jobs:
  security-audits:
    name: SAST & SCA Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Vulnerability Scan (SCA)
        run: npm audit --audit-level=high

      - name: Filesystem Vulnerability & Secret Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  publish-package:
    name: Secure Publish to NPM
    needs: security-audits # WILL NOT run if security scans fail
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL: Required for NPM Provenance (OIDC)
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js for Publishing
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: npm ci

      - name: Build Svelte Package
        # FIXED: Changed from 'npm run package' to 'npm run prepack'
        run: npm run prepack 

      - name: Publish with Provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}